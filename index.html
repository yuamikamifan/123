<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload 🎀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        h1 {
            color: #764ba2;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 30px;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            margin: 20px 0;
            background: linear-gradient(135deg, #f5f7ff 0%, #f0f1ff 100%);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: linear-gradient(135deg, #ede9ff 0%, #e8e4ff 100%);
        }
        
        .upload-area.dragover {
            border-color: #764ba2;
            background: linear-gradient(135deg, #ddd0ff 0%, #d5c5ff 100%);
        }
        
        .upload-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .upload-text {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .upload-subtext {
            color: #999;
            font-size: 0.85em;
        }
        
        input[type='file'] {
            display: none;
        }
        
        .upload-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .upload-btn:active {
            transform: translateY(0);
        }
        
        #message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            min-height: 20px;
            display: none;
        }
        
        .message-success {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            border: 2px solid #28a745;
            display: block !important;
        }
        
        .message-error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            border: 2px solid #f5c6cb;
            display: block !important;
        }
        
        .file-name {
            color: #667eea;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Upload a File 🎀</h1>
        <p class="subtitle">Share your files with cuteness!</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Click or drag your file here</div>
            <div class="upload-subtext">Any file type is welcome!</div>
        </div>
        
        <input type="file" id="fileInput" />
        <button class="upload-btn" onclick="triggerFileInput()">Choose File</button>
        <div id="message"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const messageDiv = document.getElementById('message');
        
        // Trigger file input when clicking upload area
        uploadArea.addEventListener('click', triggerFileInput);
        
        function triggerFileInput() {
            fileInput.click();
        }
        
        // Handle file selection
        fileInput.addEventListener('change', handleFileSelect);
        
        // Drag and drop functionality
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                handleFileSelect();
            }
        });
        
        function handleFileSelect() {
            if (fileInput.files.length === 0) {
                showMessage('Please select a file to upload.', 'error');
                return;
            }
            const file = fileInput.files[0];
            localStorage.setItem('uploadedFileName', file.name);
            showMessage('✨ File uploaded: <span class="file-name">' + file.name + '</span> 🎉', 'success');
        }
        
        function showMessage(text, type) {
            messageDiv.innerHTML = text;
            messageDiv.className = 'message-' + type;
        }
    </script>
</body>
</html>
