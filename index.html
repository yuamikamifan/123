<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Archive</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 class="brand">Cute Archive</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Gallery</a></li>
                <li><a href="#">Upload</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="upload-section">
            <h2>Upload Your Files</h2>
            <div class="upload-area" id="upload-area">
                <p>Drag and drop your files here or click to select files.</p>
            </div>
            <input type="file" id="file-input" multiple style="display:none;">
        </section>
        <section class="gallery">
            <h2>File Gallery</h2>
            <div class="gallery-grid" id="gallery-grid">
                <!-- Dynamically added file cards will appear here -->
            </div>
        </section>
    </main>
    <script>
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const galleryGrid = document.getElementById('gallery-grid');

        // Load files from localStorage
        const loadFiles = () => {
            const files = JSON.parse(localStorage.getItem('files')) || [];
            files.forEach(file => addFileToGallery(file));
        };

        // Add selected or dropped files to the gallery
        const addFileToGallery = file => {
            const card = document.createElement('div');
            card.classList.add('file-card');
            card.innerHTML = `<p>${file.name}</p><button onclick="deleteFile('${file.name}')">Delete</button>`;
            galleryGrid.appendChild(card);
        };

        // Handle drag and drop
        uploadArea.addEventListener('dragover', event => {
            event.preventDefault();
            uploadArea.classList.add('highlight');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('highlight');
        });

        uploadArea.addEventListener('drop', event => {
            event.preventDefault();
            uploadArea.classList.remove('highlight');
            const files = event.dataTransfer.files;
            handleFiles(files);
        });

        // Handle file selection
        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', event => handleFiles(event.target.files));

        // Handle files and add to gallery
        const handleFiles = files => {
            const fileArray = Array.from(files);
            fileArray.forEach(file => {
                addFileToGallery(file);
                saveFileToLocalStorage(file);
            });
        };

        // Save files to localStorage
        const saveFileToLocalStorage = file => {
            const files = JSON.parse(localStorage.getItem('files')) || [];
            files.push(file);
            localStorage.setItem('files', JSON.stringify(files));
        };

        // Delete file from gallery and localStorage
        const deleteFile = fileName => {
            const files = JSON.parse(localStorage.getItem('files')) || [];
            const updatedFiles = files.filter(file => file.name !== fileName);
            localStorage.setItem('files', JSON.stringify(updatedFiles));
            loadFiles(); // Refresh gallery
        };

        // Initial load of files
        loadFiles();
    </script>
</body>
</html>
