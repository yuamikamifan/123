<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Register</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        input {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Login</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <p>Don't have an account? <a href="#" id="toggleForm">Register</a></p>
    </form>

    <h2 style="display: none;">Register</h2>
    <form id="registerForm" style="display: none;">
        <input type="text" id="newUsername" placeholder="Username" required>
        <input type="password" id="newPassword" placeholder="Password" required>
        <button type="submit">Register</button>
        <p>Already have an account? <a href="#" id="toggleForm2">Login</a></p>
    </form>
</div>

<script>
    document.getElementById('toggleForm').addEventListener('click', function() {
        document.getElementById('loginForm').style.display = 'none';
        document.querySelector('h2').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
    });

    document.getElementById('toggleForm2').addEventListener('click', function() {
        document.getElementById('registerForm').style.display = 'none';
        document.querySelector('h2').style.display = 'block';
        document.getElementById('loginForm').style.display = 'flex';
    });

    // Function to handle login
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        // TODO: Integrate with backend API for login
        // Example: fetch('/api/login', { method: 'POST', body: JSON.stringify({ username, password }) });
    });

    // Function to handle registration
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        // TODO: Integrate with backend API for registration
        // Example: fetch('/api/register', { method: 'POST', body: JSON.stringify({ newUsername, newPassword }) });
    });
</script>

</body>
</html>
